name: iOS
on:
  push:
    branches: [ main, master ]
  workflow_run:
    workflows: [ "CI" ] # Запуск после тестов
    types: [ completed ]

jobs:
  build:
    if: ${{ github.event.workflow_run.conclusion == 'success' || github.event_name == 'push' }}
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      # 1. Собираем Kotlin-фреймворк для iOS
      - name: Compile Kotlin Multiplatform iOS framework
        run: ./gradlew :shared:linkReleaseFrameworkIosArm64

      # 2. Проверяем сборку самого приложения через xcodebuild (под симулятор)
      - name: Build iOS App for Simulator
        run: |
          xcodebuild -project iosApp/iosApp.xcodeproj \
                     -scheme iosApp \
                     -sdk iphonesimulator \
                     -destination 'platform=iOS Simulator,name=iPhone 15,OS=latest' \
                     build CODE_SIGNING_ALLOWED=NO
